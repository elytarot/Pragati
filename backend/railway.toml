# railway.toml — Railway deployment configuration for PRAGATI Backend
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "pragati-backend"

[services.variables]
NODE_ENV = "production"
PORT     = "4000"
